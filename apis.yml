apis:
  - aid: charityapi:charityapi
    name: CharityAPI
    description: >-
      CharityAPI provides REST endpoints for looking up US nonprofit organizations
      by EIN, performing public charity 501c3 verification checks, and powering
      autocomplete search across the IRS Business Master File. The API supports
      donation platforms, fundraising tools, and compliance workflows that need
      authoritative tax-status data.

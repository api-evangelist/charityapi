aid: charityapi
name: CharityAPI
description: >-
  CharityAPI provides a simple REST API for data about US nonprofits and charities
  sourced directly from IRS filings. Developers can retrieve nonprofit records by
  EIN, verify whether an organization is a public charity (501c3) with tax-deductible
  status, and integrate organization name autocomplete to power donation, vetting,
  and compliance workflows.
